<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老爷集团 | Laoye Group</title>
<meta name="description" content="老爷集团 — 以AI重构产业价值">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "Songti SC", Georgia, serif;
  background: #0a0a0e;
  color: #d4c9a8;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ── Ink reveal container ── */
.ink-stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ── Background reveal image ── */
.reveal-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ── Canvas mask (ink layer) ── */
#inkCanvas {
  position: absolute;
  inset: 0;
  z-index: 1;
  cursor: crosshair;
}

/* ── Brand overlay (always visible) ── */
.brand-overlay {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}

.brand-seal {
  width: 80px;
  height: 80px;
  border: 2px solid rgba(212, 201, 168, 0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  transition: all 1.2s ease;
}

.brand-seal span {
  font-size: 28px;
  font-weight: 700;
  color: #d4c9a8;
  letter-spacing: 4px;
}

.brand-title {
  font-size: clamp(36px, 8vw, 80px);
  font-weight: 700;
  color: #d4c9a8;
  letter-spacing: 8px;
  text-shadow: 0 2px 40px rgba(0,0,0,0.6);
  margin-bottom: 8px;
  transition: all 1.2s ease;
}

.brand-sub {
  font-size: clamp(12px, 2vw, 18px);
  color: rgba(212, 201, 168, 0.7);
  letter-spacing: 6px;
  font-weight: 400;
  transition: all 1.2s ease;
}

.brand-tagline {
  margin-top: 36px;
  font-size: clamp(13px, 1.4vw, 18px);
  color: rgba(212, 201, 168, 0.5);
  letter-spacing: 2px;
  font-weight: 300;
  line-height: 1.8;
  transition: all 1.2s ease;
}

.brand-tagline em {
  font-style: normal;
  color: rgba(212, 201, 168, 0.7);
}

.brand-hint {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: rgba(212, 201, 168, 0.3);
  letter-spacing: 3px;
  animation: pulse-hint 2.4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes pulse-hint {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* ── Fade overlay when revealed ── */
.ink-stage.revealed .brand-hint { display: none; }
.ink-stage.revealed .brand-seal { border-color: rgba(212, 175, 55, 0.6); }

/* ── Responsive ── */
@media (max-width: 640px) {
  .brand-title { letter-spacing: 4px; }
  .brand-sub { letter-spacing: 3px; }
  .brand-tagline { margin-top: 20px; }
}
</style>
</head>
<body>

<div class="ink-stage" id="inkStage">
  <!-- Reveal image underneath -->
  <img class="reveal-bg" src="reveal.jpg" alt="老爷集团" loading="eager">

  <!-- Ink mask canvas -->
  <canvas id="inkCanvas"></canvas>

  <!-- Brand overlay (always on top) -->
  <div class="brand-overlay">
    <div class="brand-seal"><span>爷</span></div>
    <div class="brand-title">老爷集团</div>
    <div class="brand-sub">LAOYE GROUP</div>
    <div class="brand-tagline">
      以<em>AI</em>重构产业价值<br>
      让<em>技术</em>归于实业
    </div>
    <div class="brand-hint">✧ 移动鼠标 拂去墨迹 ✧</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// Ink Reveal — 墨迹擦除效果 (vanilla JS)
// ══════════════════════════════════════════════
(function(){
  const canvas = document.getElementById('inkCanvas');
  const stage = document.getElementById('inkStage');
  const ctx = canvas.getContext('2d');

  // ─── 配置 ───
  const MASK_RGB = [12, 12, 16];    // 深墨色
  const BRUSH_SIZE = 140;
  const LIFETIME = 700;
  const R_START = 8;
  const R_VARY = 0.45;
  const STAMP_STEP = 8;
  const MAX_STAMPS = 260;
  const SEGMENTS = 40;
  const WOBBLE = [0.15, 0.09, 0.04];
  const GRAD_INNER = 0.15;
  const GRAD_STOPS = [0.92, 0.82, 0];

  // ─── 状态 ───
  let stamps = [];
  let running = false;
  let lastPos = null;
  let w = 0, h = 0;
  let revealedFlag = false;

  // ─── Resize ───
  function resize() {
    const parent = canvas.parentElement;
    if (!parent) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = parent.getBoundingClientRect();
    w = rect.width;
    h = rect.height;
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgb(${MASK_RGB[0]},${MASK_RGB[1]},${MASK_RGB[2]})`;
    ctx.fillRect(0, 0, w, h);
  }

  // ─── 绘制不规则圆（墨迹笔触） ───
  function carve(x, y, r, seed, alpha) {
    const g = ctx.createRadialGradient(x, y, r * GRAD_INNER, x, y, r);
    g.addColorStop(0, `rgba(0,0,0,${GRAD_STOPS[0] * alpha})`);
    g.addColorStop(0.5, `rgba(0,0,0,${GRAD_STOPS[1] * alpha})`);
    g.addColorStop(1, `rgba(0,0,0,${GRAD_STOPS[2] * alpha})`);
    ctx.fillStyle = g;

    ctx.beginPath();
    for (let i = 0; i <= SEGMENTS; i++) {
      const a = (i / SEGMENTS) * Math.PI * 2;
      const wob = 0.78 +
        WOBBLE[0] * Math.sin(a * 3 + seed) +
        WOBBLE[1] * Math.sin(a * 5 + seed * 2.1) +
        WOBBLE[2] * Math.sin(a * 7 + seed * 0.7);
      const px = x + Math.cos(a) * r * wob;
      const py = y + Math.sin(a) * r * wob;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  }

  // ─── 添加墨印 ───
  function addStamp(x, y) {
    if (stamps.length >= MAX_STAMPS) stamps.shift();
    stamps.push({
      x, y,
      born: performance.now(),
      seed: Math.random() * Math.PI * 2,
      rmax: BRUSH_SIZE * (1 - R_VARY + Math.random() * R_VARY),
    });
  }

  function stampAlong(x, y) {
    if (!lastPos) {
      addStamp(x, y);
    } else {
      const dx = x - lastPos.x;
      const dy = y - lastPos.y;
      const dist = Math.hypot(dx, dy);
      const steps = Math.max(1, Math.ceil(dist / STAMP_STEP));
      for (let i = 1; i <= steps; i++) {
        addStamp(lastPos.x + (dx * i) / steps, lastPos.y + (dy * i) / steps);
      }
    }
    lastPos = { x, y };
  }

  // ─── 动画循环 ───
  function loop(now) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgb(${MASK_RGB[0]},${MASK_RGB[1]},${MASK_RGB[2]})`;
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'destination-out';

    const countBefore = stamps.length;
    for (let i = stamps.length - 1; i >= 0; i--) {
      const t = (now - stamps[i].born) / LIFETIME;
      if (t >= 1) { stamps.splice(i, 1); continue; }
      const ease = 1 - Math.pow(1 - t, 3);
      const r = R_START + (stamps[i].rmax - R_START) * ease;
      const alpha = 1 - t * t;
      carve(ctx, stamps[i].x, stamps[i].y, r, stamps[i].seed, alpha);
    }

    // 检测是否基本擦完了
    if (countBefore > 0 && stamps.length === 0 && !revealedFlag) {
      revealedFlag = true;
      stage.classList.add('revealed');
    }

    if (stamps.length > 0) {
      requestAnimationFrame(loop);
    } else {
      running = false;
    }
  }

  function startLoop() {
    if (!running) { running = true; requestAnimationFrame(loop); }
  }

  // ─── 鼠标/触摸事件 ───
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) {
      const touch = e.touches[0] || e.changedTouches[0];
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  canvas.addEventListener('mousemove', (e) => {
    const pos = getPos(e);
    stampAlong(pos.x, pos.y);
    startLoop();
  });

  canvas.addEventListener('mouseenter', (e) => {
    const pos = getPos(e);
    lastPos = pos;
    stampAlong(pos.x, pos.y);
    startLoop();
  });

  canvas.addEventListener('mouseleave', () => { lastPos = null; });

  // 触摸支持
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const pos = getPos(e);
    stampAlong(pos.x, pos.y);
    startLoop();
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    const pos = getPos(e);
    lastPos = pos;
    stampAlong(pos.x, pos.y);
    startLoop();
  });

  canvas.addEventListener('touchend', () => { lastPos = null; });

  // ─── 初始化 ───
  resize();
  window.addEventListener('resize', resize);
})();
</script>
</body>
</html>
